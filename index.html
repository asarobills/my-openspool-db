<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSpool DB - Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .filament-card { transition: all 0.2s ease; }
        .modal-active { display: flex !important; }
        .fab-button { box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 pb-24">

    <div class="max-w-md mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-blue-400">OpenSpool DB</h1>
            <p class="text-gray-400 text-sm">Filament Inventory & NFC Writer</p>
        </header>

        <div class="mb-6">
            <input type="text" id="searchInput" onkeyup="filterSpools()" placeholder="Search brand, color, or material..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div id="filamentList" class="space-y-4"></div>
    </div>

    <button onclick="openAddModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 rounded-full text-white text-3xl fab-button z-40 flex items-center justify-center font-bold">
        +
    </button>

    <div id="editorModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-sm">
            <h2 id="modalTitle" class="text-xl font-bold mb-4">Configure Spool</h2>
            
            <div class="space-y-3 mb-6">
                <input type="text" id="fieldBrand" placeholder="Brand (e.g. Overture)" class="w-full bg-gray-700 rounded-lg p-3 text-white border-none">
                <div class="flex gap-2">
                    <input type="text" id="fieldColor" placeholder="Color" class="flex-1 bg-gray-700 rounded-lg p-3 text-white border-none">
                    <input type="color" id="fieldHex" value="#3b82f6" class="w-12 h-12 bg-gray-700 rounded-lg p-1 border-none cursor-pointer">
                </div>
                <select id="fieldMaterial" class="w-full bg-gray-700 rounded-lg p-3 text-white border-none">
                    <option value="PLA">PLA</option>
                    <option value="PETG">PETG</option>
                    <option value="ABS">ABS</option>
                    <option value="TPU">TPU</option>
                    <option value="ASA">ASA</option>
                </select>

                <div class="grid grid-cols-3 gap-2 py-2">
                    <button onclick="setPreset(200, 220)" class="bg-gray-700 text-xs py-2 rounded-lg border border-gray-600">PLA</button>
                    <button onclick="setPreset(230, 250)" class="bg-gray-700 text-xs py-2 rounded-lg border border-gray-600">PETG</button>
                    <button onclick="setPreset(245, 265)" class="bg-gray-700 text-xs py-2 rounded-lg border border-gray-600">ABS</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-gray-500 mb-1 font-bold uppercase">Min Temp °C</label>
                        <input type="number" id="fieldMin" class="w-full bg-gray-700 rounded-lg p-3 text-white border-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-500 mb-1 font-bold uppercase">Max Temp °C</label>
                        <input type="number" id="fieldMax" class="w-full bg-gray-700 rounded-lg p-3 text-white border-none">
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                <button id="mainActionButton" onclick="finalizeNFC()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">Copy JSON</button>
            </div>
            <button id="saveNewButton" onclick="saveNewSpool()" class="hidden w-full bg-green-600 py-3 rounded-xl font-bold mt-3">Save to Database</button>
        </div>
    </div>

        // Initial Data from your JSON

","color":"Digital Blue","rgb":"#0099E6","spool_properties":{}},{"id":"c1697d8f-d80c-482a-9202-a3c2d6749305","brand":"RepRapper","material":"PLA","color":"Light Green","rgb":"#65F834","spool_properties":{}},{"id":"ed0193ce-58f9-45ee-9f33-01655534a3e5","brand":"RepRapper","material":"PLA","color":"Light Green","rgb":"#65F834","spool_properties":{}},{"id":"e4de73a9-7a47-4f4e-a1ed-0367526698ca","brand":"RepRapper","material":"PLA","color":"White","rgb":"#FFFFFF","spool_properties":{}},{"id":"4cebbc22-7b38-4143-a0a5-ec873ced6628","brand":"RepRapper","material":"PLA","color":"White","rgb":"#FFFFFF","spool_properties":{}},{"id":"de631ad1-3e8f-4b61-b7db-6d6b840731d1","brand":"SOLEYIN","material":"PLA","color":"Greenery","rgb":"#B2BA81","spool_properties":{}},{"id":"d2445a9d-5a57-41fe-aa05-9bdef32019b5","brand":"SOLEYIN","material":"PLA","color":"Strawberry Milk","rgb":"#FF1850","spool_properties":{}},{"id":"a99beef1-84e1-4cee-9039-f595b97b93a8","brand":"SOLEYIN","material":"PLA","color":"White","rgb":"#FFFFFF","spool_properties":{}},{"id":"8c5a9c17-f77f-41b6-88ea-a67aca01fc6e","brand":"SUNLU","material":"PETG","color":"Roasted Chestnut","rgb":"#3E2B2E","spool_properties":{}},{"id":"71b00713-371a-4e79-9381-51078d8aa1f1","brand":"SUNLU","material":"PLA","color":"Black","rgb":"#000000","spool_properties":{}},{"id":"0f4bd668-7169-4fb9-8b24-aec3c9d9fbc7","brand":"SUNLU","material":"PLA","color":"Red","rgb":"#F50A0A","spool_properties":{}},{"id":"a65e6c8a-7a03-4b71-9a8e-a699de3c6365","brand":"SUNLU","material":"PLA","color":"Cyan","rgb":"#01A9DD","spool_properties":{}},{"id":"6a4c9df4-4624-48c0-ad4d-a46a3fc2030d","brand":"SUNLU","material":"PLA","color":"Magenta","rgb":"#FF00FF","spool_properties":{}},{"id":"aaa2ae4b-cdaa-4f76-88ca-0b0e4cd5abaa","brand":"SUNLU","material":"PLA","color":"White","rgb":"#FFFFFF","spool_properties":{}},{"id":"2a4c412c-82a1-4bf4-8374-13103379c1b6","brand":"SUNLU","material":"PLA","color":"Yellow","rgb":"#FFFF00","spool_properties":{}},{"id":"e4b07a63-6609-4886-a67a-7a1a69b3a39f","brand":"SUNLU","material":"PLA","color":"Sunny Orange","rgb":"#E65E0F","spool_properties":{}},{"id":"6c2e1721-db17-4af9-a6b7-1b7c06cc6a2f","brand":"SUNLU","material":"PLA+/Pro","color":"Sky Blue","rgb":"#15A9C2","spool_properties":{}},{"id":"ae16c08e-1eee-4809-933f-d55ab16880a9","brand":"Stronghero3d","material":"PETG","color":"Translucent Rainbow","rgb":"#EE1111","spool_properties":{}},{"id":"3f77a590-f185-4555-845c-a03fe1e10972","brand":"Stronghero3d","material":"PETG","color":"Blue Gradient","rgb":"#2478FF","spool_properties":{}},{"id":"1f5511cc-6559-4e16-9674-037663ac0a96","brand":"Stronghero3d","material":"PLA","color":"Silk Gold / Galaxy Red","rgb":"#E1AE56","spool_properties":{}},{"id":"09816bb6-6850-4c81-93eb-1c2a61769d80","brand":"eSUN","material":"PLA","color":"Green","rgb":"#08E222","spool_properties":{}},{"id":"2b203c09-59fe-4ca6-90ea-e6c68b4a74d1","brand":"eSUN","material":"PLA","color":"Grey","rgb":"#536C8B","spool_properties":{}}];

        // Load custom spools from local storage
        let customSpools = JSON.parse(localStorage.getItem('customSpools')) || [];
        let allSpools = [...initialData, ...customSpools];
        let activeSpool = null;

        function renderList(filter = "") {
            const list = document.getElementById('filamentList');
            list.innerHTML = '';
            const filtered = allSpools.filter(s => 
                s.brand.toLowerCase().includes(filter.toLowerCase()) ||
                s.color.toLowerCase().includes(filter.toLowerCase()) ||
                s.material.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach((f) => {
                list.innerHTML += `
                    <div onclick="openEditor('${f.id}')" class="filament-card bg-gray-800 p-4 rounded-xl border-l-4 shadow-md flex justify-between items-center cursor-pointer" 
                         style="border-left-color: ${f.rgb ? f.rgb.split(',')[0] : '#555'}">
                        <div>
                            <h3 class="font-bold text-lg">${f.brand}</h3>
                            <p class="text-sm text-gray-400">${f.color} ${f.material}</p>
                        </div>
                        <div class="text-blue-400 font-bold">➔</div>
                    </div>
                `;
            });
        }

        function openAddModal() {
            activeSpool = null;
            document.getElementById('modalTitle').innerText = "Add New Spool";
            document.getElementById('fieldBrand').value = "";
            document.getElementById('fieldColor').value = "";
            document.getElementById('fieldHex').value = "#3b82f6";
            document.getElementById('fieldMin').value = 200;
            document.getElementById('fieldMax').value = 220;
            
            document.getElementById('mainActionButton').classList.add('hidden');
            document.getElementById('saveNewButton').classList.remove('hidden');
            document.getElementById('editorModal').classList.add('modal-active');
        }

        function openEditor(id) {
            activeSpool = allSpools.find(s => s.id === id);
            document.getElementById('modalTitle').innerText = "Configure NFC Data";
            document.getElementById('fieldBrand').value = activeSpool.brand;
            document.getElementById('fieldColor').value = activeSpool.color;
            document.getElementById('fieldHex').value = activeSpool.rgb ? activeSpool.rgb.split(',')[0] : "#ffffff";
            document.getElementById('fieldMin').value = activeSpool.spool_properties.min_temp || 200;
            document.getElementById('fieldMax').value = activeSpool.spool_properties.max_temp || 220;
            
            document.getElementById('mainActionButton').classList.remove('hidden');
            document.getElementById('saveNewButton').classList.add('hidden');
            document.getElementById('editorModal').classList.add('modal-active');
        }

        function saveNewSpool() {
            const newSpool = {
                id: Date.now().toString(),
                brand: document.getElementById('fieldBrand').value || "Unknown",
                color: document.getElementById('fieldColor').value || "Custom",
                material: document.getElementById('fieldMaterial').value,
                rgb: document.getElementById('fieldHex').value,
                spool_properties: {
                    min_temp: parseInt(document.getElementById('fieldMin').value),
                    max_temp: parseInt(document.getElementById('fieldMax').value)
                }
            };
            customSpools.push(newSpool);
            localStorage.setItem('customSpools', JSON.stringify(customSpools));
            allSpools = [...initialData, ...customSpools];
            renderList();
            closeModal();
        }

        function setPreset(min, max) {
            document.getElementById('fieldMin').value = min;
            document.getElementById('fieldMax').value = max;
        }

        function closeModal() {
            document.getElementById('editorModal').classList.remove('modal-active');
        }

        function finalizeNFC() {
            const openSpoolPayload = {
                protocol: "openspool",
                version: "1.0",
                brand: document.getElementById('fieldBrand').value,
                type: document.getElementById('fieldMaterial').value,
                color_hex: document.getElementById('fieldHex').value.replace('#', ''),
                min_temp: parseInt(document.getElementById('fieldMin').value),
                max_temp: parseInt(document.getElementById('fieldMax').value)
            };
            navigator.clipboard.writeText(JSON.stringify(openSpoolPayload)).then(() => {
                alert("NFC JSON Copied!");
                closeModal();
            });
        }

        function filterSpools() { renderList(document.getElementById('searchInput').value); }
        renderList();
    </script>
</body>
</html>
